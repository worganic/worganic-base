<div class="max-w-6xl mx-auto px-6 py-8">

  <!-- En-tête -->
  <div class="flex items-center gap-4 mb-8">
    <div class="w-10 h-10 rounded-xl bg-red-500/10 border border-red-500/20 flex items-center justify-center">
      <span class="material-symbols-outlined text-red-400 text-xl">admin_panel_settings</span>
    </div>
    <div>
      <h1 class="text-2xl font-bold text-light-text dark:text-white tracking-tight">Administration</h1>
      <p class="text-sm text-light-text-muted dark:text-white/40 mt-0.5">Gestion des projets et des utilisateurs</p>
    </div>
  </div>

  <!-- Onglets -->
  <div class="flex gap-1 mb-6 p-1 bg-light-surface dark:bg-surface border border-light-border dark:border-white/10 rounded-xl w-fit">
<button (click)="setTab('users')"
            class="flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-semibold transition-all"
            [class]="activeTab() === 'users'
              ? 'bg-white dark:bg-background text-light-primary dark:text-primary shadow-sm border border-light-border dark:border-white/10'
              : 'text-light-text-muted dark:text-white/50 hover:text-light-text dark:hover:text-white'">
      <span class="material-symbols-outlined text-base">group</span>
      Utilisateurs
      @if (usersCount() > 0) {
        <span class="text-[10px] bg-light-primary/10 dark:bg-primary/10 text-light-primary dark:text-primary px-1.5 py-0.5 rounded-full font-bold">{{ usersCount() }}</span>
      }
    </button>
    <button (click)="setTab('deploiement')"
            class="flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-semibold transition-all"
            [class]="activeTab() === 'deploiement'
              ? 'bg-white dark:bg-background text-light-primary dark:text-primary shadow-sm border border-light-border dark:border-white/10'
              : 'text-light-text-muted dark:text-white/50 hover:text-light-text dark:hover:text-white'">
      <span class="material-symbols-outlined text-base">rocket_launch</span>
      Déploiement
      @if (versionStatus() && (versionStatus().mode === 'child' ? (!versionStatus().child?.upToDate || !versionStatus().base?.upToDate) : !versionStatus().upToDate)) {
        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
      }
    </button>
    <button (click)="setTab('help')"
            class="flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-semibold transition-all"
            [class]="activeTab() === 'help'
              ? 'bg-white dark:bg-background text-light-primary dark:text-primary shadow-sm border border-light-border dark:border-white/10'
              : 'text-light-text-muted dark:text-white/50 hover:text-light-text dark:hover:text-white'">
      <span class="material-symbols-outlined text-base">help</span>
      Help
      @if (helpCount() > 0) {
        <span class="text-[10px] bg-light-primary/10 dark:bg-primary/10 text-light-primary dark:text-primary px-1.5 py-0.5 rounded-full font-bold">{{ helpCount() }}</span>
      }
    </button>
    <button (click)="setTab('config')"
            class="flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-semibold transition-all"
            [class]="activeTab() === 'config'
              ? 'bg-white dark:bg-background text-light-primary dark:text-primary shadow-sm border border-light-border dark:border-white/10'
              : 'text-light-text-muted dark:text-white/50 hover:text-light-text dark:hover:text-white'">
      <span class="material-symbols-outlined text-base">settings</span>
      Config
    </button>
  </div>

  <!-- Contenu des onglets -->
@if (activeTab() === 'users') {
    <app-admin-users (count)="usersCount.set($event)" />
  }
  @if (activeTab() === 'deploiement') {
    <app-admin-deployments (versionStatusChange)="versionStatus.set($event)" />
  }
  @if (activeTab() === 'help') {
    <app-admin-help [editId]="helpEditId()" (count)="helpCount.set($event)" />
  }
  @if (activeTab() === 'config') {
    <app-config [embeddedMode]="true" />
  }

</div>
