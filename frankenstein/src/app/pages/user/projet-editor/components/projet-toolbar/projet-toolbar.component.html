<header class="flex items-center h-11 px-3 bg-white dark:bg-surface border-b border-light-border dark:border-white/10 gap-2 flex-shrink-0 shadow-sm z-10">

  <!-- Logo minimaliste -->
  <button (click)="goHome()"
          class="flex items-center gap-1.5 px-2 py-1 rounded-lg text-xs font-bold text-light-primary dark:text-primary hover:bg-light-surface dark:hover:bg-white/5 transition-all flex-shrink-0">
    <span class="material-symbols-outlined text-base">rocket_launch</span>
    <span class="hidden md:inline">FJ</span>
  </button>

  <span class="material-symbols-outlined text-xs text-light-border dark:text-white/20">chevron_right</span>

  <!-- Lien Projets -->
  <button (click)="goProjets()"
          class="text-xs text-light-text-muted dark:text-white/50 hover:text-light-text dark:hover:text-white transition-colors px-1">
    Projets
  </button>

  <span class="material-symbols-outlined text-xs text-light-border dark:text-white/20">chevron_right</span>

  <!-- Nom du projet -->
  <span class="text-xs font-semibold text-light-text dark:text-white truncate max-w-[200px]">{{ projectTitle || 'Projet' }}</span>

  <!-- Séparateur -->
  <div class="flex-1"></div>

  <!-- Sauvegarder -->
  <button (click)="save.emit()"
          [class]="isDirty ? 'text-light-primary dark:text-primary border-light-primary/40 dark:border-primary/30 bg-light-primary/5 dark:bg-primary/5' : 'text-light-text-muted dark:text-white/30 border-light-border dark:border-white/10'"
          class="flex items-center gap-1 px-3 py-1 rounded-lg border text-xs font-medium transition-all">
    <span class="material-symbols-outlined text-sm">save</span>
    <span class="hidden sm:inline">{{ isDirty ? 'Sauvegarder' : 'Sauvegardé' }}</span>
  </button>

  <div class="w-px h-5 bg-light-border dark:bg-white/10 mx-1"></div>

  <!-- Déconnexion -->
  <button (click)="logout()"
          title="Déconnexion"
          class="flex items-center gap-1 px-2 py-1 rounded-lg text-xs text-light-text-muted dark:text-white/40 hover:text-red-400 hover:bg-red-500/5 border border-transparent hover:border-red-400/20 transition-all">
    <span class="material-symbols-outlined text-base">logout</span>
  </button>

</header>
