<div class="max-w-4xl mx-auto px-6 py-8">

  <!-- En-tête éditeur -->
  <div class="flex items-center gap-4 mb-6">
    <button (click)="goBack()"
            class="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-light-surface dark:bg-surface border border-light-border dark:border-white/10 hover:border-light-primary dark:hover:border-primary text-light-text-muted dark:text-white/50 hover:text-light-primary dark:hover:text-primary transition-all text-sm">
      <span class="material-symbols-outlined text-base">arrow_back</span>
      Retour
    </button>
    <div>
      <h1 class="text-xl font-bold text-light-text dark:text-white tracking-tight">Éditeur de document</h1>
      <p class="text-xs text-light-text-muted dark:text-white/40 mt-0.5">Markdown avec prévisualisation live</p>
    </div>
  </div>

  <!-- Description -->
  <p class="text-sm text-light-text-muted dark:text-white/50 mb-5">
    Rédigez votre document en utilisant la syntaxe <strong class="text-light-text dark:text-white/80">Markdown</strong>.
    Utilisez la barre d'outils pour formater votre texte, puis cliquez sur
    <em class="text-light-primary dark:text-primary">Valider</em> pour afficher le rendu final.
  </p>

  <!-- Éditeur Markdown -->
  <app-markdown-editor
    [(value)]="markdownContent"
    placeholder="Écrivez votre document en Markdown ici..."></app-markdown-editor>

  <!-- Actions -->
  <div class="flex justify-end mt-4">
    <button (click)="validate()"
            class="flex items-center gap-2 px-5 py-2.5 rounded-lg bg-light-primary dark:bg-primary text-white dark:text-btn-text font-bold transition-all hover:scale-105 shadow-lg shadow-light-primary/20 dark:shadow-primary/20 text-sm">
      <span class="material-symbols-outlined text-base">check_circle</span>
      Valider
    </button>
  </div>

  <!-- Résultat rendu -->
  @if (isValidated()) {
    <div class="mt-8 p-6 rounded-xl bg-white dark:bg-surface border border-light-border dark:border-white/10">
      <h2 class="text-lg font-bold text-light-text dark:text-white mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-light-primary dark:text-primary">preview</span>
        Résultat rendu
      </h2>
      <div class="prose prose-sm dark:prose-invert max-w-none text-light-text dark:text-white/80"
           [innerHTML]="renderedHtml()"></div>
    </div>
  }

</div>
